version: 2

sources:
  - name: stripe
    database: dbt-tutorial
    schema: stripe
    tables:
      - name: payment
        columns:
        - name: paymentmethod
          tests:
            - not_null:
                config:
                  where: "status = 'success'"
        - name: status
          tests:
            - accepted_values:
                arguments:
                  values: ['success', 'fail', 'pending']
                config:
                  limit: 10
                  store_failures: true

            